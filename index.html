<!doctype html>
<html lang="en">
  <head>
    <!-- ✅ BASIC -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ TITLE (VERY IMPORTANT FOR SEO) -->
    <title>Alph Knot | Global Talent & Business Solutions</title>

    <!-- ✅ META DESCRIPTION -->
    <meta
      name="description"
      content="Alph Knot provides global talent, outsourcing, AI operations, and business solutions to help companies scale faster and reduce costs."
    />

    <!-- ✅ KEYWORDS -->
    <meta
      name="keywords"
      content="global outsourcing, hire remote team, AI operations, business process outsourcing, virtual assistants, Alph Knot"
    />

    <!-- ✅ AUTHOR -->
    <meta name="author" content="Alph Knot" />

    <!-- ✅ FAVICON -->
    <link rel="icon" href="src/assets/images/Logo.png" type="image/png" />

    <!-- ✅ OPEN GRAPH (SOCIAL SHARE SEO) -->
    <meta property="og:title" content="Alph Knot | Global Talent Solutions" />
    <meta
      property="og:description"
      content="Scale your business with global talent, AI operations, and outsourcing solutions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:image" content="https://yourdomain.com/logo.png" />

    <!-- ✅ TWITTER SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alph Knot" />
    <meta
      name="twitter:description"
      content="Global talent and outsourcing solutions for modern businesses."
    />
    <meta name="twitter:image" content="https://yourdomain.com/logo.png" />

    <!-- ✅ CANONICAL URL -->
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- ✅ ROBOTS -->
    <meta name="robots" content="index, follow" />

    <!-- ✅ PERFORMANCE -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ✅ SCHEMA MARKUP (VERY IMPORTANT 🚀) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Alph Knot",
        "url": "https://yourdomain.com",
        "logo": "https://yourdomain.com/logo.png",
        "description": "Global talent, outsourcing, and AI business solutions company.",
        "sameAs": [
          "https://www.linkedin.com/",
          "https://twitter.com/"
        ]
      }
    </script>
  </head>

  <body>
    <!-- ✅ ROOT -->
    <div id="root"></div>

    <!-- ✅ SCRIPT -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
