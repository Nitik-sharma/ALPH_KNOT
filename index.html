<!doctype html>
<html lang="en">
  <head>
    <!-- ✅ BASIC -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ TITLE -->
    <title>Alph Knot | Global Talent & Business Solutions</title>

    <!-- ✅ META DESCRIPTION -->
    <meta
      name="description"
      content="Alph Knot helps businesses scale with global talent, outsourcing, AI operations, and business support solutions."
    />

    <!-- ✅ KEYWORDS -->
    <meta
      name="keywords"
      content="outsourcing, global talent, virtual assistants, AI operations, remote team, business support"
    />

    <!-- ✅ AUTHOR -->
    <meta name="author" content="Alph Knot" />

    <!-- ✅ FAVICON (FIXED) -->
    <link rel="icon" href="/logo.png" type="image/png" />

    <!-- ✅ PERFORMANCE (IMPORTANT) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ✅ FONTS (ONLY ONCE) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- ✅ OPEN GRAPH (SOCIAL SEO) -->
    <meta property="og:title" content="Alph Knot | Scale Your Business Globally" />
    <meta property="og:description" content="Hire global talent and scale your business with Alph Knot." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:image" content="https://yourdomain.com/logo.png" />

    <!-- ✅ TWITTER -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alph Knot" />
    <meta name="twitter:description" content="Global talent and outsourcing solutions." />
    <meta name="twitter:image" content="https://yourdomain.com/logo.png" />

    <!-- ✅ CANONICAL -->
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- ✅ ROBOTS -->
    <meta name="robots" content="index, follow" />

    <!-- ✅ SCHEMA (GOOD FOR GOOGLE RANKING) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Alph Knot",
        "url": "https://yourdomain.com",
        "logo": "https://yourdomain.com/logo.png",
        "description": "Global talent, outsourcing, and AI business solutions.",
        "sameAs": [
          "https://www.linkedin.com/",
          "https://twitter.com/"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
